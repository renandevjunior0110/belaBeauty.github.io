<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Studio Bela</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff9f5 0%, #fff5f0 100%);
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .login-container h2 {
            color: var(--brown-dark);
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-container input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 1rem;
            border: 2px solid var(--rose-gold-light);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .login-container input:focus {
            outline: none;
            border-color: var(--rose-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 140, 0.2);
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--rose-gold) 0%, var(--rose-gold-dark) 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 140, 0.4);
        }
        .erro {
            background: #ffe0e0;
            color: #d33;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 1rem;
        }
        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Studio Bela">
        </div>
        <h2>🔐 Painel Administrativo</h2>
        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required autofocus>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #999;">
            Acesso restrito ao Studio Bela
        </p>
    </div>
</body>
</html>
